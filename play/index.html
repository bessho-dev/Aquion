<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Language Studio</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>

    <style>
        :root {
            --bg: #f9f9f9;
            --sidebar: #ffffff;
            --accent: #007aff;
            --border: #e0e0e0;
            --terminal-bg: #1e1e1e;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; }
        
        /* Layout */
        .container { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 60px 1fr 25px; height: 100vh; }

        header { grid-column: 1 / -1; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--accent); letter-spacing: -1px; }

        aside { background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .nav-item { font-size: 0.9rem; font-weight: 600; color: #666; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .nav-item:hover { background: #f0f0f0; color: var(--accent); }
        .nav-item.active { background: #eef6ff; color: var(--accent); }

        main { display: flex; flex-direction: column; background: #fff; }
        
        /* Editor & Terminal Split */
        #editor-container { flex: 3; border-bottom: 4px solid var(--border); position: relative; }
        .CodeMirror { height: 100%; font-size: 14px; font-family: 'Fira Code', 'Menlo', monospace; }

        #terminal { flex: 2; background: var(--terminal-bg); color: #fff; display: flex; flex-direction: column; }
        .term-header { background: #333; padding: 5px 15px; font-size: 0.7rem; color: #aaa; display: flex; justify-content: space-between; }
        #output { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
        
        .repl-box { display: flex; background: #252525; padding: 10px 15px; align-items: center; border-top: 1px solid #444; }
        .repl-prompt { color: var(--accent); font-weight: bold; margin-right: 10px; font-family: monospace; }
        .repl-input { flex: 1; background: transparent; border: none; color: #50fa7b; outline: none; font-family: monospace; font-size: 14px; }

        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,122,255,0.3); }

        footer { grid-column: 1 / -1; background: var(--accent); color: white; font-size: 11px; display: flex; align-items: center; padding: 0 20px; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; animation: s 1s linear infinite; margin-bottom: 15px; }
        @keyframes s { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spin"></div>
    <div id="status">Water Interpreter Loading...</div>
</div>

<div class="container">
    <header>
        <div class="logo">WATER <span>STUDIO</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background: #555;" onclick="clearConsole()">Clear</button>
            <button class="btn" onclick="runCode()">▶ RUN SCRIPT</button>
        </div>
    </header>

    <aside>
        <div style="font-size: 0.7rem; color: #999; font-weight: bold;">MODES</div>
        <div class="nav-item active" id="mode-editor" onclick="switchMode('editor')">📝 Script Editor</div>
        <div class="nav-item" id="mode-repl" onclick="switchMode('repl')">💻 Interactive REPL</div>
        <hr style="border: 0; border-top: 1px solid var(--border); width: 100%;">
        <div style="font-size: 0.7rem; color: #999; font-weight: bold;">FILES</div>
        <div class="nav-item" onclick="downloadCode()">💾 Download .water</div>
    </aside>

    <main>
        <div id="editor-container">
            <textarea id="editor"></textarea>
        </div>
        <div id="terminal">
            <div class="term-header">
                <span>TERMINAL OUTPUT</span>
                <span id="runtime-info">Ready</span>
            </div>
            <div id="output"></div>
            <div class="repl-box" id="repl-ui" style="display: none;">
                <span class="repl-prompt">water></span>
                <input type="text" id="repl-input" class="repl-input" placeholder="Enter code..." onkeypress="handleRepl(event)">
            </div>
        </div>
    </main>

    <footer>
        Pyodide Runtime Active | Water Language v1.0 | Environment: Browser
    </footer>
</div>

<script>
    let pyodide;
    let editor;
    let mode = 'editor';

    async function init() {
        const status = document.getElementById('status');
        try {
            pyodide = await loadPyodide();
            
            status.innerText = "Loading water.py...";
            const res = await fetch('water.py');
            const pyCode = await res.text();

            // OS Error (input()) 回避のためのブリッジコード
            await pyodide.runPythonAsync(`
import sys, io
${pyCode}

# グローバルインタープリタ
_repl_interp = Interpreter()

def execute_water(src, is_repl=False):
    global _repl_interp
    if not is_repl:
        interp = Interpreter() # スクリプト実行時は毎回リセット
    else:
        interp = _repl_interp
    
    output_capture = io.StringIO()
    sys.stdout = output_capture
    sys.stderr = output_capture
    
    try:
        run_source(src, interp)
        return output_capture.getvalue()
    except Exception as e:
        return output_capture.getvalue() + f"\\nRuntime Error: {e}"
    finally:
        sys.stdout = sys.__stdout__
        sys.stderr = sys.__stderr__
            `);

            initEditor();
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            status.innerHTML = `<span style="color:red">Failed: ${e.message}</span>`;
            console.error(e);
        }
    }

    function initEditor() {
        editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "python",
            theme: "dracula",
            lineNumbers: true,
            autoCloseBrackets: true,
            indentUnit: 4
        });
        editor.setValue(`// Water Language Script\nlet message = "Hello, World!"\nprint(message)\n\nlet x = 100\nif x > 50:\n    print("x is large")\n`);
    }

    function switchMode(newMode) {
        mode = newMode;
        document.getElementById('mode-editor').classList.toggle('active', mode === 'editor');
        document.getElementById('mode-repl').classList.toggle('active', mode === 'repl');
        document.getElementById('repl-ui').style.display = mode === 'repl' ? 'flex' : 'none';
        if(mode === 'repl') document.getElementById('repl-input').focus();
    }

    async function runCode() {
        const src = editor.getValue();
        appendOutput("\n--- Running Script ---\n", "#007aff");
        const result = await pyodide.globals.get("execute_water")(src, false);
        appendOutput(result || "(Finished with no output)");
    }

    async function handleRepl(e) {
        if (e.key === 'Enter') {
            const val = e.target.value;
            if (!val.trim()) return;
            appendOutput(`water> ${val}`, "#50fa7b");
            const result = await pyodide.globals.get("execute_water")(val + "\n", true);
            if (result.trim()) appendOutput(result);
            e.target.value = '';
        }
    }

    function appendOutput(txt, color = "#fff") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.style.color = color;
        div.innerText = txt;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function clearConsole() { document.getElementById('output').innerHTML = ''; }

    function downloadCode() {
        const blob = new Blob([editor.getValue()], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'main.water';
        a.click();
    }

    window.onload = init;
</script>

</body>
</html>

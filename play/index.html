<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Water Language Studio Pro</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>

    <style>
        :root { --accent: #007aff; --bg: #f9f9f9; --border: #e0e0e0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; }
        .grid { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
        header { grid-column: 1 / -1; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 10; }
        aside { background: #fff; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        main { display: flex; flex-direction: column; overflow: hidden; }
        #editor-container { flex: 1; border-bottom: 5px solid var(--border); }
        .CodeMirror { height: 100%; font-size: 14px; }
        #console { flex: 0.6; background: #1e1e1e; color: #fff; display: flex; flex-direction: column; }
        #output { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; line-height: 1.5; }
        .repl-box { background: #252525; padding: 10px 15px; display: flex; align-items: center; border-top: 1px solid #444; }
        .repl-input { flex: 1; background: transparent; border: none; color: #50fa7b; outline: none; font-family: monospace; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { opacity: 0.8; }
        #loader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="status">Loading water.py...</div>
</div>

<div class="grid">
    <header>
        <div style="font-weight: 800; font-size: 1.2rem; color: var(--accent);">WATER STUDIO</div>
        <button class="btn" onclick="runFullScript()">▶ RUN SCRIPT (Ctrl+Enter)</button>
    </header>

    <aside>
        <div style="font-size: 0.7rem; color: #999; font-weight: bold;">VIEW MODE</div>
        <button class="btn" style="background:#eee; color:#333;" onclick="toggleRepl(false)">Editor Only</button>
        <button class="btn" style="background:#eee; color:#333;" onclick="toggleRepl(true)">Interactive REPL</button>
        <hr style="width:100%; border:0; border-top:1px solid var(--border)">
        <button class="btn" style="background:#555;" onclick="clearConsole()">Clear Console</button>
    </aside>

    <main>
        <div id="editor-container"><textarea id="editor-raw"></textarea></div>
        <div id="console">
            <div id="output"></div>
            <div class="repl-box" id="repl-ui" style="display:none;">
                <span style="color:var(--accent); font-weight:bold; margin-right:10px;">water></span>
                <input type="text" id="repl-input" class="repl-input" onkeypress="handleRepl(event)">
            </div>
        </div>
    </main>
</div>

<script>
    let pyodide;
    let editor;
    let _repl_interp;

    async function init() {
        const status = document.getElementById('status');
        try {
            pyodide = await loadPyodide();
            
            // 1. water.py をテキストとして取得
            const response = await fetch('water.py');
            let pyCode = await response.text();

            // 2. 【最重要】OSエラーの原因となる末尾の実行部分を削る
            // main() が自動で呼ばれないようにソースを加工
            pyCode = pyCode.replace(/if\s+__name__\s*==\s*['"]__main__['"]\s*:/g, "if False:");

            status.innerText = "Initializing Interpreter...";
            
            // 3. 加工したコードを実行してクラス定義だけを読み込む
            await pyodide.runPythonAsync(`
import sys, io
${pyCode}

# グローバル用のインタープリタ
_repl_interp = Interpreter()

def execute_water(src, is_repl=False):
    global _repl_interp
    target_interp = _repl_interp if is_repl else Interpreter()
    
    out = io.StringIO()
    sys.stdout = out
    sys.stderr = out
    try:
        run_source(src, target_interp)
        return out.getvalue()
    except Exception as e:
        return out.getvalue() + "\\nError: " + str(e)
    finally:
        sys.stdout = sys.__stdout__
        sys.stderr = sys.__stderr__
            `);

            // Editorの初期化
            editor = CodeMirror.fromTextArea(document.getElementById("editor-raw"), {
                mode: "python", theme: "dracula", lineNumbers: true, autoCloseBrackets: true,
                extraKeys: {"Ctrl-Enter": runFullScript}
            });
            editor.setValue("// Water Language\nlet x = 10\nlet y = 20\nprint(\"Result: \" + (x + y))\n");

            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            status.innerHTML = `<b style="color:red">Loading Failed</b><br>${e.message}`;
            console.error(e);
        }
    }

    async function runFullScript() {
        appendOutput("\n--- Executing Script ---", "#888");
        const result = await pyodide.globals.get("execute_water")(editor.getValue(), false);
        appendOutput(result || "(no output)");
    }

    async function handleRepl(e) {
        if (e.key === 'Enter') {
            const val = e.target.value;
            if (!val.trim()) return;
            appendOutput("water> " + val, "#50fa7b");
            const result = await pyodide.globals.get("execute_water")(val + "\n", true);
            if (result.trim()) appendOutput(result);
            e.target.value = '';
        }
    }

    function toggleRepl(show) {
        document.getElementById('repl-ui').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('repl-input').focus();
    }

    function appendOutput(txt, color = "#fff") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.style.color = color;
        div.innerText = txt;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function clearConsole() { document.getElementById('output').innerHTML = ''; }

    window.onload = init;
</script>
</body>
</html>

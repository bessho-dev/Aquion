<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water IDE Pro</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>

    <style>
        :root {
            --bg-color: #f9f9f9;
            --sidebar-bg: #ffffff;
            --primary: #007aff;
            --border: #e8e8e8;
            --text: #2c3e50;
            --console-bg: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* 画面レイアウト */
        .app-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 50px 1fr 30px;
            height: 100vh;
        }

        /* ヘッダー */
        header {
            grid-column: 1 / -1;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); }

        /* サイドバー */
        aside {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .menu-label { font-size: 0.7rem; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 5px; }
        
        /* メインエリア */
        main { display: flex; flex-direction: column; position: relative; }

        /* タブ */
        .tabs { display: flex; background: #eee; gap: 1px; padding: 5px 10px 0; }
        .tab {
            padding: 8px 20px; background: #ddd; border-radius: 6px 6px 0 0;
            cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .tab.active { background: #fff; font-weight: bold; }

        /* エディタ */
        .editor-wrapper { flex: 1; position: relative; background: #fff; border-bottom: 5px solid var(--border); }
        .CodeMirror { height: 100%; font-size: 14px; font-family: 'Fira Code', monospace; }

        /* コンソール */
        .console-wrapper { height: 35%; background: var(--console-bg); display: flex; flex-direction: column; }
        .console-header {
            background: #333; color: #ccc; padding: 5px 15px;
            font-size: 0.75rem; display: flex; justify-content: space-between;
        }
        .console-output {
            flex: 1; overflow-y: auto; padding: 10px 15px;
            color: #fff; font-family: monospace; font-size: 13px; line-height: 1.5;
        }

        /* REPL入力 */
        .repl-input-area {
            display: flex; background: #222; padding: 10px 15px; border-top: 1px solid #444;
            align-items: center;
        }
        .repl-prompt { color: var(--primary); font-weight: bold; margin-right: 10px; }
        .repl-input {
            flex: 1; background: transparent; border: none; color: #00ff00;
            outline: none; font-family: monospace;
        }

        /* ボタン */
        .btn {
            background: var(--primary); color: white; border: none;
            padding: 8px 15px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn-sec { background: #f0f0f0; color: #333; }

        /* ステータスバー */
        footer {
            grid-column: 1 / -1; background: var(--primary); color: white;
            font-size: 0.7rem; display: flex; align-items: center; padding: 0 15px;
        }

        /* ロード画面 */
        #loader {
            position: fixed; inset: 0; background: #fff; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-status">Initializing Python Environment...</div>
</div>

<div class="app-grid">
    <header>
        <div class="logo">🌊 Water IDE <span style="font-weight: 300; font-size: 0.8rem; color: #666;">v1.0</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sec" onclick="exportCode()">Export .water</button>
            <button class="btn" onclick="runFullCode()">▶ Run Script</button>
        </div>
    </header>

    <aside>
        <div>
            <div class="menu-label">Project</div>
            <div style="font-size: 0.9rem;">📄 main.water</div>
        </div>
        <hr style="width:100%; border:0; border-top:1px solid var(--border)">
        <div>
            <div class="menu-label">Settings</div>
            <label style="font-size: 0.8rem;"><input type="checkbox" id="auto-clear" checked> Auto-clear Console</label>
        </div>
        <div style="margin-top: auto;">
            <div class="menu-label">Interpreter</div>
            <div id="py-status" style="font-size: 0.75rem; color: green;">● Pyodide Ready</div>
        </div>
    </aside>

    <main>
        <div class="tabs">
            <div class="tab active" id="tab-editor" onclick="setMode('editor')">Editor Mode</div>
            <div class="tab" id="tab-repl" onclick="setMode('repl')">Interactive REPL</div>
        </div>

        <div class="editor-wrapper" id="editor-container">
            <textarea id="code-editor"></textarea>
        </div>

        <div class="console-wrapper">
            <div class="console-header">
                <span>TERMINAL</span>
                <span onclick="clearConsole()" style="cursor:pointer">Clear</span>
            </div>
            <div class="console-output" id="output"></div>
            
            <div class="repl-input-area" id="repl-area" style="display:none;">
                <span class="repl-prompt">water></span>
                <input type="text" id="repl-input" class="repl-input" placeholder="Type code and hit Enter..." onkeypress="handleRepl(event)">
            </div>
        </div>
    </main>

    <footer>
        Status: Ready | Language: Water | Runtime: Pyodide 0.24.1
    </footer>
</div>

<script>
    let pyodide;
    let editor;
    let currentMode = 'editor';

    async function init() {
        const status = document.getElementById('loader-status');
        try {
            pyodide = await loadPyodide();
            
            status.innerText = "Fetching water.py...";
            const resp = await fetch('water.py');
            const source = await resp.text();
            
            // 重要：OSErrorを防ぐため、Python側の __name__ == "__main__" ブロックを無効化してロード
            // または、必要なクラスだけをロードするようにラップする
            status.innerText = "Preparing Water Interpreter...";
            await pyodide.runPythonAsync(`
import io, sys
${source}

# グローバルなインタープリタインスタンスを作成
_global_interp = Interpreter()

def run_water_logic(src, mode="script"):
    global _global_interp
    if mode == "script":
        _global_interp = Interpreter() # スクリプト実行時は初期化
    
    out = io.StringIO()
    sys.stdout = out
    sys.stderr = out
    
    try:
        # water.pyのrun_sourceを直接叩く
        run_source(src, _global_interp)
        result = out.getvalue()
    except Exception as e:
        result = out.getvalue() + "\\nError: " + str(e)
    finally:
        sys.stdout = sys.__stdout__
        sys.stderr = sys.__stderr__
    return result
            `);

            initEditor();
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            status.innerHTML = `<b style="color:red">Error:</b> ${e.message}`;
            console.error(e);
        }
    }

    function initEditor() {
        editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "python",
            theme: "neo",
            lineNumbers: true,
            autoCloseBrackets: true,
            indentUnit: 4
        });
        editor.setValue(`// Welcome to Water Language\nprint("Hello, Water!")\n\nlet x = 10\nlet y = 20\nprint(x + y)`);
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tab-editor').className = mode === 'editor' ? 'tab active' : 'tab';
        document.getElementById('tab-repl').className = mode === 'repl' ? 'tab active' : 'tab';
        document.getElementById('repl-area').style.display = mode === 'repl' ? 'flex' : 'none';
        
        if (mode === 'repl') {
            document.getElementById('repl-input').focus();
        }
    }

    async function runFullCode() {
        if (document.getElementById('auto-clear').checked) clearConsole();
        const code = editor.getValue();
        appendToConsole("> Running Script...", "color: #555");
        
        const result = await pyodide.globals.get("run_water_logic")(code, "script");
        appendToConsole(result || "(Process finished with no output)");
    }

    async function handleRepl(e) {
        if (e.key === 'Enter') {
            const input = e.target.value;
            if (!input.trim()) return;
            
            appendToConsole(`water> ${input}`, "color: var(--primary)");
            e.target.value = '';
            
            const result = await pyodide.globals.get("run_water_logic")(input + "\n", "repl");
            if (result.trim()) appendToConsole(result);
        }
    }

    function appendToConsole(text, style = "") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.style = style;
        div.innerText = text;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function clearConsole() {
        document.getElementById('output').innerHTML = '';
    }

    function exportCode() {
        const blob = new Blob([editor.getValue()], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'main.water';
        a.click();
    }

    window.onload = init;
</script>

</body>
</html>

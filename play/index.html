<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Water Studio</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        :root {
            --water-blue: #7ba2ff;
            --water-light: #f4f7ff;
            --text-main: #4a5568;
            --text-sub: #a0aec0;
            --bg-white: #ffffff;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background: linear-gradient(135deg, #fdfeff 0%, #edf2ff 100%);
            color: var(--text-main);
            overflow: hidden; /* 全体スクロール防止 */
        }

        /* 背景の波紋風装飾 */
        body::before {
            content: ""; position: fixed; top: -10%; right: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(123, 162, 255, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        /* メインレイアウト */
        .app-container {
            display: flex; flex-direction: column; height: 100vh;
        }

        /* ヘッダー：画像のデザインを意識 */
        header {
            padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(123, 162, 255, 0.1);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 24px; height: 24px; border: 2px solid var(--water-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon::after {
            content: ""; width: 6px; height: 6px; background: var(--water-blue); border-radius: 50%;
        }
        .brand-name { font-size: 1.2rem; font-weight: 300; letter-spacing: 2px; color: var(--text-main); }

        /* 実行ボタン */
        .run-btn {
            background: var(--bg-white); border: 1px solid var(--water-blue);
            color: var(--water-blue); padding: 6px 20px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 500; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 2px 10px rgba(123, 162, 255, 0.1);
        }
        .run-btn:active { transform: scale(0.95); background: var(--water-blue); color: #fff; }

        /* エディタエリア */
        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        .editor-section { flex: 1; position: relative; background: #fff; }
        .CodeMirror { height: 100%; font-size: 16px; line-height: 1.6; }

        /* コンソールエリア */
        .console-section {
            height: 35%; background: var(--glass); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(123, 162, 255, 0.2);
            display: flex; flex-direction: column;
            transition: height 0.3s ease;
        }

        .console-header {
            padding: 8px 20px; font-size: 0.7rem; color: var(--text-sub);
            letter-spacing: 1px; display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        #output {
            flex: 1; overflow-y: auto; padding: 15px 20px;
            font-family: "Fira Code", monospace; font-size: 0.9rem;
            white-space: pre-wrap; color: var(--text-main);
        }

        /* スマホ用ボトムナビ（キーボード表示時の利便性向上） */
        .mobile-tools {
            display: none; padding: 10px 20px; background: #fff;
            border-top: 1px solid var(--water-light); justify-content: space-around;
        }

        /* ロード画面：画像の雰囲気に統一 */
        #loader {
            position: fixed; inset: 0; background: #fdfeff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .water-drop {
            width: 50px; height: 50px; border: 2px solid var(--water-blue);
            border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(0.9); opacity: 0.5; }
            50% { transform: rotate(-45deg) scale(1); opacity: 1; }
            100% { transform: rotate(-45deg) scale(0.9); opacity: 0.5; }
        }
        #load-msg { margin-top: 20px; font-weight: 200; letter-spacing: 2px; font-size: 0.8rem; color: var(--water-blue); }

        /* レスポンシブ調整 */
        @media (max-width: 768px) {
            .brand-name { font-size: 1rem; }
            .console-section { height: 40%; }
            .CodeMirror { font-size: 14px; }
            .mobile-tools { display: flex; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="water-drop"></div>
    <div id="load-msg">INITIALIZING WATER...</div>
</div>

<div class="app-container">
    <header>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <div class="brand-name">Water</div>
        </div>
        <button class="run-btn" onclick="runScript()">RUN</button>
    </header>

    <div class="main-content">
        <div class="editor-section">
            <textarea id="editor"></textarea>
        </div>
        
        <div class="console-section">
            <div class="console-header">
                <span>CONSOLE</span>
                <span onclick="clearOutput()" style="cursor:pointer">CLEAR</span>
            </div>
            <div id="output"></div>
        </div>
    </div>

    <div class="mobile-tools">
        <button class="run-btn" style="width: 100%;" onclick="runScript()">実行する</button>
    </div>
</div>

<script>
    let pyodide;
    let editor;

    async function init() {
        try {
            pyodide = await loadPyodide();
            
            // water.py の読み込み
            const res = await fetch('water.py');
            let code = await res.text();

            // I/Oエラー回避: main()の自動実行を無効化
            code = code.replace(/if\s+__name__\s*==\s*['"]__main__['"]\s*:/g, "if False:");

            await pyodide.runPythonAsync(`
import sys, io
${code}

def web_run(src):
    out = io.StringIO()
    sys.stdout = out
    sys.stderr = out
    try:
        run_source(src, Interpreter())
        return out.getvalue()
    except Exception as e:
        return out.getvalue() + f"\\nError: {e}"
    finally:
        sys.stdout = sys.__stdout__
        sys.stderr = sys.__stderr__
            `);

            // エディタ設定
            editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
                mode: "python",
                lineNumbers: true,
                indentUnit: 4,
                theme: "default",
                inputStyle: "contenteditable" // スマホでの入力性を改善
            });
            
            // 初期コードは空に設定
            editor.setValue("");

            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('load-msg').innerText = "ERROR: " + e.message;
        }
    }

    async function runScript() {
        const src = editor.getValue();
        if(!src.trim()) return;

        // 実行中の視覚フィードバック
        const btn = document.querySelector('.run-btn');
        btn.innerText = "RUNNING...";
        
        const result = await pyodide.globals.get("web_run")(src);
        appendOutput(result || "> (No output)");
        
        btn.innerText = "RUN";
    }

    function appendOutput(text) {
        const out = document.getElementById('output');
        const entry = document.createElement('div');
        entry.style.marginBottom = "10px";
        entry.innerText = text;
        out.appendChild(entry);
        out.scrollTop = out.scrollHeight;
    }

    function clearOutput() {
        document.getElementById('output').innerHTML = '';
    }

    window.onload = init;
</script>

</body>
</html>
